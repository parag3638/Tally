name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: expenses
          POSTGRES_PASSWORD: expenses
          POSTGRES_DB: expenses
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U expenses"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: expenses
      PGPASSWORD: expenses
      PGDATABASE: expenses
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-secret-key-that-is-long-enough-for-hs256-testing
      APP_ENV: test
      OPENAI_API_KEY: sk-test
      ANTHROPIC_API_KEY: sk-test
      RECEIPT_STORAGE_DIR: /tmp/receipts

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Lint
        run: ruff check src tests

      - name: Run migrations
        run: python -m src.db.migrate

      - name: Run tests (unit + integration, excluding evals)
        run: pytest -q

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t tally:ci .
